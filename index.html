
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stechi - Flex Time Calculator</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Flex Time Calculator</h1>
    <div id="clock"></div>
    <div class="container">
        <div class="field-group">
            <label for="start">Start</label>
            <div class="time-input-wrap">
                <button type="button" class="step-btn" data-action="decrease" data-target="start" aria-label="Decrease start">−</button>
                <input type="text" id="start" class="time-input" inputmode="numeric" autocomplete="off" placeholder="HH:MM" data-kind="time">
                <button type="button" class="step-btn" data-action="increase" data-target="start" aria-label="Increase start">+</button>
                <button type="button" class="clear-btn" data-action="clear" data-target="start" aria-label="Clear start">✕</button>
            </div>
        </div>

        <div class="field-group">
            <label for="end">End</label>
            <div class="time-input-wrap">
                <button type="button" class="step-btn" data-action="decrease" data-target="end" aria-label="Decrease end">−</button>
                <input type="text" id="end" class="time-input" inputmode="numeric" autocomplete="off" placeholder="HH:MM" data-kind="time">
                <button type="button" class="step-btn" data-action="increase" data-target="end" aria-label="Increase end">+</button>
                <button type="button" class="clear-btn" data-action="clear" data-target="end" aria-label="Clear end">✕</button>
                <button type="button" class="now-btn" data-action="now" data-target="end">Now</button>
            </div>
        </div>

        <div class="field-group">
            <label for="work-hours">Workhours (HH:MM)</label>
            <div class="time-input-wrap">
                <button type="button" class="step-btn" data-action="decrease" data-target="work-hours" aria-label="Decrease work hours">−</button>
                <input type="text" id="work-hours" class="time-input" inputmode="numeric" autocomplete="off" placeholder="HH:MM" data-kind="duration">
                <button type="button" class="step-btn" data-action="increase" data-target="work-hours" aria-label="Increase work hours">+</button>
                <button type="button" class="clear-btn" data-action="clear" data-target="work-hours" aria-label="Clear work hours">✕</button>
            </div>
        </div>

        <div class="field-group">
            <label for="pause">Pause (HH:MM)</label>
            <div class="time-input-wrap">
                <button type="button" class="step-btn" data-action="decrease" data-target="pause" aria-label="Decrease pause">−</button>
                <input type="text" id="pause" class="time-input" inputmode="numeric" autocomplete="off" placeholder="HH:MM" data-kind="duration">
                <button type="button" class="step-btn" data-action="increase" data-target="pause" aria-label="Increase pause">+</button>
                <button type="button" class="clear-btn" data-action="clear" data-target="pause" aria-label="Clear pause">✕</button>
            </div>
        </div>

        <div class="field-group">
            <label for="glide">Flex Time Delta</label>
            <div class="time-input-wrap">
                <button type="button" class="step-btn" data-action="decrease" data-target="glide" aria-label="Decrease flex delta">−</button>
                <input type="text" id="glide" class="time-input" inputmode="numeric" autocomplete="off" placeholder="HH:MM" data-kind="flex">
                <button type="button" class="step-btn" data-action="increase" data-target="glide" aria-label="Increase flex delta">+</button>
                <button type="button" class="clear-btn" data-action="clear" data-target="glide" aria-label="Clear flex delta">✕</button>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <div id="bottom-right">
        <label for="mode">Modus:</label>
        <select id="mode" onchange="setMode(this.value)">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function parseTime(str) {
            if (!str) return null;
            const text = String(str).trim();
            if (!text) return null;
            const normalized = normalizeInputValue(text, 'time');
            if (!normalized) return null;
            const negative = normalized.startsWith('-');
            const [hoursStr = '0', minutesStr = '0'] = normalized.replace(/-/g, '').split(':');
            const total = Number(hoursStr) * 60 + Number(minutesStr);
            return negative ? -total : total;
        }

        function formatTime(minutes) {
            const h = Math.floor(Math.abs(minutes) / 60);
            const m = Math.abs(minutes) % 60;
            const sign = minutes < 0 ? '-' : '';
            return `${sign}${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function normalizeInputValue(rawValue, kind = 'time') {
            const value = String(rawValue ?? '').trim();
            if (!value) return '';

            const negative = value.startsWith('-');
            const digits = value.replace(/-/g, '').replace(/[^0-9]/g, '');
            if (!digits) return negative ? '-' : '';

            if (value.includes(':')) {
                const [hoursPart = '0', minutesPart = '0'] = value.split(':');
                const hours = String(Math.min(Number(hoursPart) || 0, 23)).padStart(2, '0');
                const minutes = String(Math.min(Number(minutesPart) || 0, 59)).padStart(2, '0');
                return `${negative ? '-' : ''}${hours}:${minutes}`;
            }

            const compact = digits.replace(/^0+(?=\d)/, '') || '0';
            let hours = 0;
            let minutes = 0;

            if (compact.length <= 2) {
                minutes = Number(compact);
            } else if (compact.length === 3) {
                hours = Number(compact[0]);
                minutes = Number(compact.slice(1));
            } else {
                hours = Number(compact.slice(0, 2));
                minutes = Number(compact.slice(2));
            }

            hours = Math.min(hours, 23);
            minutes = Math.min(minutes, 59);

            const sign = negative ? '-' : '';
            const hoursText = String(hours).padStart(2, '0');
            const minutesText = String(minutes).padStart(2, '0');
            return `${sign}${hoursText}:${minutesText}`;
        }

        function adjustFieldValue(id, delta) {
            const input = document.getElementById(id);
            if (!input) return;

            const kind = input.dataset.kind || 'time';
            const current = parseTime(input.value);
            let nextMinutes = current ?? 0;

            if (kind === 'time') {
                nextMinutes = ((nextMinutes + delta) % (24 * 60) + 24 * 60) % (24 * 60);
            } else if (kind === 'flex') {
                nextMinutes += delta;
            } else {
                nextMinutes = Math.max(0, nextMinutes + delta);
            }

            input.value = kind === 'flex'
                ? `${nextMinutes < 0 ? '-' : ''}${formatTime(Math.abs(nextMinutes))}`
                : formatTime(nextMinutes);
        }

        function clearFieldValue(id) {
            const input = document.getElementById(id);
            if (input) input.value = '';
            input.classList.remove('highlight-success');
        }

        function insertCurrentTime(id) {
            const input = document.getElementById(id);
            if (!input) return;
            const now = new Date();
            const value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            input.value = value;
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight-success').forEach((element) => {
                element.classList.remove('highlight-success');
            });
        }

        function applyCalculatedValue(targetId, value) {
            const input = document.getElementById(targetId);
            if (!input) return;
            clearHighlights();
            input.value = value;
            input.classList.add('highlight-success');
            input.focus();
            input.select();
        }

        function calculateFromFilledFields() {
            const values = {
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                work: document.getElementById('work-hours').value,
                pause: document.getElementById('pause').value,
                glide: document.getElementById('glide').value
            };

            const filled = Object.entries(values).filter(([, value]) => value && value.trim());
            if (filled.length !== 4) {
                return false;
            }

            const missingKey = Object.keys(values).find((key) => !values[key] || !values[key].trim());
            if (!missingKey) {
                return false;
            }

            const normalizedValues = {
                start: normalizeInputValue(values.start, 'time'),
                end: normalizeInputValue(values.end, 'time'),
                work: normalizeInputValue(values.work, 'duration'),
                pause: normalizeInputValue(values.pause, 'duration'),
                glide: normalizeInputValue(values.glide, 'flex')
            };

            const workMin = parseTime(normalizedValues.work) || 0;
            const pauseMin = parseTime(normalizedValues.pause) || 0;
            const startMin = parseTime(normalizedValues.start);
            const endMin = parseTime(normalizedValues.end);
            const glideMin = parseTime(normalizedValues.glide) || 0;

            let resultValue = '';
            if (missingKey === 'start') {
                resultValue = formatTime(endMin - workMin - pauseMin - glideMin);
            } else if (missingKey === 'end') {
                resultValue = formatTime(startMin + workMin + pauseMin + glideMin);
            } else if (missingKey === 'glide') {
                resultValue = formatTime((endMin - startMin - pauseMin) - workMin);
            }

            if (!resultValue) {
                return false;
            }

            const targetId = missingKey === 'start' ? 'start' : missingKey === 'end' ? 'end' : 'glide';
            applyCalculatedValue(targetId, resultValue);
            return true;
        }

        function wireTimeInputs() {
            const inputs = Array.from(document.querySelectorAll('.time-input'));

            inputs.forEach((input, index) => {
                input.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        input.value = normalizeInputValue(input.value, input.dataset.kind || 'time');

                        if (calculateFromFilledFields()) {
                            return;
                        }

                        const nextInput = inputs[index + 1];
                        if (nextInput) {
                            nextInput.focus();
                            nextInput.select();
                        }
                    }
                });
                input.addEventListener('blur', () => {
                    input.value = normalizeInputValue(input.value, input.dataset.kind || 'time');
                });
            });

            document.querySelectorAll('[data-action]').forEach((button) => {
                button.addEventListener('click', () => {
                    const action = button.dataset.action;
                    const target = button.dataset.target;

                    if (action === 'increase') {
                        adjustFieldValue(target, 1);
                    } else if (action === 'decrease') {
                        adjustFieldValue(target, -1);
                    } else if (action === 'clear') {
                        clearFieldValue(target);
                    } else if (action === 'now') {
                        insertCurrentTime(target);
                    }
                });
            });
        }

        function calculate() {
            const startStr = document.getElementById('start').value;
            const endStr   = document.getElementById('end').value;
            const workStr  = document.getElementById('work-hours').value;
            const pauseStr = document.getElementById('pause').value;
            const glideStr = document.getElementById('glide').value;

            const workMin  = parseTime(workStr) || 0;
            const pauseMin = parseTime(pauseStr) || 0;

            const missing = [];
            if (!startStr) missing.push('start');
            if (!endStr)   missing.push('end');
            if (!glideStr) missing.push('glide');

            if (missing.length !== 1) {
                document.getElementById('result').textContent =
                    'Start, End, or Flex Time must be empty to calculate.';
                return;
            }

            let resultText = '';

            if (missing[0] === 'end') {
                const startMin = parseTime(startStr);
                const glideMin = parseTime(glideStr) || 0;
                const endMin = startMin + workMin + pauseMin + glideMin;
                resultText = `Clock out at ${formatTime(endMin)}.`;
            }

            else if (missing[0] === 'start') {
                const endMin   = parseTime(endStr);
                const glideMin = parseTime(glideStr) || 0;
                const startMin = endMin - workMin - pauseMin - glideMin;
                resultText = `Clock in at ${formatTime(startMin)}.`;
            }

            else if (missing[0] === 'glide') {
                const startMin = parseTime(startStr);
                const endMin   = parseTime(endStr);
                const actualWorked = endMin - startMin - pauseMin;
                const glideMin     = actualWorked - workMin;
                resultText = `Yielded flex time: ${formatTime(glideMin)}.`;
            }

            document.getElementById('result').textContent = resultText;
        }

        function setMode(mode) {
            if (mode === 'light') {
                document.body.className = 'light';
            } else if (mode === 'dark') {
                document.body.className = 'dark';
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.body.className = prefersDark ? 'dark' : 'light';
            }
        }

        wireTimeInputs();
        setMode(document.getElementById('mode').value);
    </script>
</body>
</html>
